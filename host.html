<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Control — Global Agent Mission</title>
  <meta name="description" content="Host control panel for the Global Agent Mission game.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="host-container">
  <!-- Header -->
  <div class="host-header">
    <h1>🌐 GLOBAL AGENT MISSION</h1>
    <div class="host-status">
      <span class="status-dot" id="host-status-dot"></span>
      <span id="host-status-text">WAITING</span>
    </div>
  </div>

  <!-- ═══ LOBBY ═══ -->
  <div id="host-lobby" class="host-lobby">
    <h2>Mission Control</h2>
    <p class="player-count"><span id="player-count">0</span> agents connected</p>
    <div class="host-player-grid" id="host-player-grid"></div>
    <button class="btn-primary" id="host-start-btn" onclick="hostStartGame()">START MISSION</button>
  </div>

  <!-- ═══ GAME PANEL ═══ -->
  <div id="host-game" class="hidden">
    <div class="host-game-panel">
      <!-- Left: Current Question -->
      <div class="host-q-panel">
        <h3>CURRENT QUESTION</h3>
        <p style="font-size:10px;color:var(--muted);margin-bottom:8px" id="host-q-meta"></p>
        <p class="host-q-text" id="host-q-text"></p>
        <div class="host-q-answer" id="host-q-answer"></div>
        <div class="host-q-stats" id="host-q-stats"></div>
        <div class="host-controls" style="margin-top:16px">
          <button class="btn-primary" id="host-next-btn" onclick="hostNextQuestion()">NEXT QUESTION →</button>
          <button class="btn-secondary" id="host-reveal-btn" onclick="hostRevealAnswer()">REVEAL ANSWER</button>
        </div>
      </div>
      <!-- Right: Leaderboard -->
      <div class="host-lb-panel">
        <h3>LIVE LEADERBOARD</h3>
        <ol class="host-lb-list" id="host-lb-list"></ol>
      </div>
    </div>
  </div>

  <!-- ═══ FUN FACT ═══ -->
  <div id="host-funfact" class="host-funfact-panel hidden">
    <h2>💡 DID YOU KNOW?</h2>
    <p class="funfact-text" id="host-funfact-text"></p>
    <button class="btn-primary" onclick="hostNextRound()">CONTINUE TO NEXT ROUND →</button>
  </div>

  <!-- ═══ FINAL ═══ -->
  <div id="host-final" class="host-final hidden">
    <h2>🏆 MISSION COMPLETE</h2>
    <div class="podium" id="host-podium"></div>
    <div class="host-full-ranking" id="host-ranking"></div>
    <div class="host-class-stats" id="host-class-stats"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="questions.js"></script>
<script src="host.js"></script>
</body>
</html>
